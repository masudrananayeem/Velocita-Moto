<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bugatti Chiron | Velocita Moto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="car-details.css">
</head>

<body>

<section class="hero">

    <img src="img/showcase/bugatti.jpg">

    <div class="hero-content">

        <h1>Bugatti Chiron</h1>

        <p>
            Beyond Speed
        </p>

    </div>

</section>

<section class="details">

    <div class="container">

        <h2>Overview</h2>

        <p>
            The Bugatti is the sports car.
            Crafted with exceptional attention to detail, it delivers
            unmatched comfort, elegance and prestige.
        </p>

        <div class="spec-grid">

            <div class="spec-card">
                <h3>Engine</h3>
                <p>8.0L Quad Turbo W16</p>
            </div>

            <div class="spec-card">
                <h3>Power</h3>
                <p>1500 HP</p>
            </div>

            <div class="spec-card">
                <h3>Top Speed</h3>
                <p>490 km/h</p>
            </div>

            <div class="spec-card">
                <h3>0-100 km/h</h3>
                <p>2.4 Seconds</p>
            </div>

        </div>

    </div>

</section>

</body>
</html>
